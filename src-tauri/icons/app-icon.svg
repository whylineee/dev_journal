<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0b22"/>
      <stop offset="0.5" stop-color="#121240"/>
      <stop offset="1" stop-color="#0e1630"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="108" y1="80" x2="340" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1c1c50"/>
      <stop offset="1" stop-color="#16163c"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="108" y1="80" x2="340" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3a3a6e"/>
      <stop offset="1" stop-color="#26264e"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="148" x2="310" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="check1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="check2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="penGrad" x1="350" y1="340" x2="440" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="badgeBg" x1="350" y1="340" x2="450" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1a52"/>
      <stop offset="1" stop-color="#141442"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect x="24" y="24" width="464" height="464" rx="104"/>
    </clipPath>
    <linearGradient id="glassShine" x1="108" y1="80" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.10"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="190" cy="170" r="150" fill="#38bdf8" opacity="0.06" clip-path="url(#roundClip)"/>
  <circle cx="380" cy="400" r="130" fill="#818cf8" opacity="0.05" clip-path="url(#roundClip)"/>

  <!-- Glass card shadow -->
  <rect x="112" y="90" width="248" height="310" rx="32" fill="#000010" opacity="0.35"/>

  <!-- Glass card body -->
  <rect x="108" y="82" width="248" height="310" rx="32" fill="url(#cardFill)" stroke="url(#cardStroke)" stroke-width="2"/>

  <!-- Glass highlight (top-left reflection) -->
  <rect x="108" y="82" width="248" height="310" rx="32" fill="url(#glassShine)"/>

  <!-- Title bar (accent gradient) -->
  <rect x="144" y="136" width="176" height="16" rx="8" fill="url(#accent)"/>

  <!-- Text lines -->
  <rect x="144" y="174" width="152" height="12" rx="6" fill="#4c4c80"/>
  <rect x="144" y="202" width="168" height="12" rx="6" fill="#404070"/>
  <rect x="144" y="230" width="130" height="12" rx="6" fill="#383868"/>

  <!-- Checkbox row 1 — empty -->
  <rect x="144" y="268" width="22" height="22" rx="6" stroke="#38bdf8" stroke-width="2.5" fill="none"/>
  <rect x="178" y="273" width="116" height="12" rx="6" fill="#4c4c80"/>

  <!-- Checkbox row 2 — checked (blue) -->
  <rect x="144" y="306" width="22" height="22" rx="6" fill="url(#check1)"/>
  <path d="M150 317L156 323L165 312" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="178" y="311" width="96" height="12" rx="6" fill="#404070"/>

  <!-- Checkbox row 3 — checked (purple) -->
  <rect x="144" y="344" width="22" height="22" rx="6" fill="url(#check2)"/>
  <path d="M150 355L156 361L165 350" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="178" y="349" width="80" height="12" rx="6" fill="#383868"/>

  <!-- Pen badge shadow -->
  <circle cx="390" cy="396" r="56" fill="#000010" opacity="0.4"/>

  <!-- Pen badge circle -->
  <circle cx="386" cy="390" r="56" fill="url(#badgeBg)" stroke="url(#cardStroke)" stroke-width="2"/>

  <!-- Pen icon -->
  <g transform="translate(358, 360)">
    <path d="M38 6L50 18L20 48L4 54L10 38L38 6Z" fill="url(#penGrad)"/>
    <path d="M32 12L44 24" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M10 38L4 54L20 48" fill="white" opacity="0.25"/>
  </g>
</svg>
