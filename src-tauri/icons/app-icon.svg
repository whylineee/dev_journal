<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.3"/>
      <stop offset="0.4" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background - bright cyan for easy spotting -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>
  <!-- Top-left shine -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#shine)"/>
  <!-- Bold white checkmark - simple, recognizable at any size -->
  <path d="M140 256 L220 340 L380 140" stroke="white" stroke-width="72" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
