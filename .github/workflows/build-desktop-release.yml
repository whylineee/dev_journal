name: Build Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows bundles
        run: npm run tauri:build:windows

      - name: Prepare Windows release files
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $msi = Get-ChildItem -File src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi | Select-Object -First 1
          $exe = Get-ChildItem -File src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe | Select-Object -First 1

          if (-not $msi -or -not $exe) {
            throw "Windows bundles were not found."
          }

          $normalizedMsi = "Dev-Journal-$version-windows-x64.msi"
          $normalizedExe = "Dev-Journal-$version-windows-x64-setup.exe"
          Copy-Item $msi.FullName $normalizedMsi
          Copy-Item $exe.FullName $normalizedExe

          $lines = @()
          foreach ($asset in @($normalizedMsi, $normalizedExe)) {
            $hash = (Get-FileHash -Path $asset -Algorithm SHA256).Hash.ToLower()
            $lines += "$hash  $asset"
          }
          $lines | Set-Content checksums-windows.txt

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dev-journal-windows
          path: |
            Dev-Journal-*-windows-x64.msi
            Dev-Journal-*-windows-x64-setup.exe
            checksums-windows.txt
          if-no-files-found: error

      - name: Attach Windows files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Dev-Journal-*-windows-x64.msi
            Dev-Journal-*-windows-x64-setup.exe
            checksums-windows.txt

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Import Apple signing certificate
        if: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build and sign macOS app bundle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APP_BUNDLE="src-tauri/target/release/bundle/macos/Dev Journal.app"
          npm run tauri build -- --bundles app

          if [ ! -d "$APP_BUNDLE" ]; then
            echo "macOS app bundle was not found."
            exit 1
          fi

          if [ -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]; then
            codesign --force --deep --options runtime --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" "$APP_BUNDLE"
          else
            # Fallback to ad-hoc signing so bundle isn't shipped with invalid linker-only signature.
            codesign --force --deep --sign - "$APP_BUNDLE"
          fi

          mkdir -p src-tauri/target/release/bundle/dmg
          DMG_PATH="src-tauri/target/release/bundle/dmg/Dev Journal_${VERSION}_aarch64.dmg"
          STAGING_DIR="$RUNNER_TEMP/dmg-root"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_BUNDLE" "$STAGING_DIR/Dev Journal.app"
          ln -s /Applications "$STAGING_DIR/Applications"
          hdiutil create -volname "Dev Journal" -srcfolder "$STAGING_DIR" -ov -format UDZO "$DMG_PATH"

      - name: Notarize macOS DMG
        if: ${{ secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_API_KEY != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER != '' }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DMG_PATH="src-tauri/target/release/bundle/dmg/Dev Journal_${VERSION}_aarch64.dmg"
          KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          echo "${{ secrets.APPLE_API_KEY }}" > "$KEY_PATH"
          xcrun notarytool submit "$DMG_PATH" --key "$KEY_PATH" --key-id "${{ secrets.APPLE_API_KEY_ID }}" --issuer "${{ secrets.APPLE_API_ISSUER }}" --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Prepare macOS release files
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DMG_PATH="src-tauri/target/release/bundle/dmg/Dev Journal_${VERSION}_aarch64.dmg"

          if [ ! -f "$DMG_PATH" ]; then
            echo "macOS DMG bundle was not found."
            exit 1
          fi

          NORMALIZED_DMG="Dev-Journal-${VERSION}-macos-arm64.dmg"
          NORMALIZED_SHA="Dev-Journal-${VERSION}-macos-arm64.sha256"
          cp "$DMG_PATH" "$NORMALIZED_DMG"
          shasum -a 256 "$NORMALIZED_DMG" > "$NORMALIZED_SHA"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dev-journal-macos
          path: |
            Dev-Journal-*-macos-arm64.dmg
            Dev-Journal-*-macos-arm64.sha256
          if-no-files-found: error

      - name: Attach macOS files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Dev-Journal-*-macos-arm64.dmg
            Dev-Journal-*-macos-arm64.sha256
